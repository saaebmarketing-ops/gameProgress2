<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Dev Blog - Infinity Quest</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <i class="fas fa-gamepad"></i>
                <span>Dev Blog</span>
            </div>
            <ul class="nav-links">
                <li><a href="#home" class="nav-link active">Home</a></li>
                <li><a href="#gallery" class="nav-link">Gallery</a></li>
                <li><a href="#videos" class="nav-link">Video</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="hero">
        <h1>Infinity Quest</h1>
        <p class="hero-subtitle">Game Showcase</p>
    </section>

    <!-- Gallery Section -->
    <section id="gallery" class="gallery">
        <h2 class="section-title">Gallery</h2>

        <div class="gallery-grid">
            <div class="gallery-item" data-category="environment">
                <img src="assets/GunImage.png" alt="Mystical Forest">
                <div class="gallery-overlay">
                    <h3>Gun Image</h3>
                    <i class="fas fa-expand-alt"></i>
                </div>
            </div>

            <div class="gallery-item" data-category="combat">
                <img src="assets/SheepImage.png" alt="Epic Battle">
                <div class="gallery-overlay">
                    <h3>Sheep Image</h3>
                    <i class="fas fa-expand-alt"></i>
                </div>
            </div>
        </div>

        <!-- Lightbox -->
        <div id="lightbox" class="lightbox">
            <span class="close">&times;</span>
            <img class="lightbox-content" src="" alt="">
            <div class="lightbox-caption"></div>
            <button class="lightbox-nav prev">&#10094;</button>
            <button class="lightbox-nav next">&#10095;</button>
        </div>
    </section>

    <!-- Videos Section -->
    <section id="videos" class="videos">
        <h2 class="section-title">Video</h2>

        <div class="videos-grid">
            <article class="video-post">
                <div class="video-container">
                    <video width="100%" height="315" controls>
                        <source src="assets/Player Movement_ Dash and Double Jump - Google Gemini.webm" type="video/webm">
                    </video>
                </div>
                <div class="video-content">
                    <h3>Gameplay Demo</h3>
                    <p>Watch our latest gameplay featuring the innovative movement system.</p>
                </div>
            </article>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>Game Dev: Saaeb</p><br>
                <p> Artist: Saya</p>
                <p></p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
